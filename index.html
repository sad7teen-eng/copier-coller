<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Copie Rapide</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --accent: #6366f1;
      --accent2: #a855f7;
      --text: #f0f0f5;
      --muted: #888899;
      --success: #22c55e;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      padding: 20px 16px 100px;
    }

    header {
      text-align: center;
      padding: 24px 0 28px;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    /* --- FAB bouton Nouveau --- */
    #btn-new {
      position: fixed;
      bottom: 28px;
      right: 24px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 22px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(99,102,241,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-new:active { transform: scale(0.95); box-shadow: 0 3px 12px rgba(99,102,241,0.35); }
    #btn-new svg { width: 18px; height: 18px; }

    /* --- Liste de cartes --- */
    #cards-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 640px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      padding: 16px 18px;
      cursor: pointer;
      position: relative;
      transition: background 0.15s, transform 0.12s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .card:hover { background: var(--surface2); }
    .card:active { transform: scale(0.985); }

    .card-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .card-text {
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 80px;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
    }
    .card-text.expanded {
      max-height: none;
      -webkit-mask-image: none;
      mask-image: none;
    }

    .card-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .card-copy-hint {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .card-copy-hint svg { width: 13px; height: 13px; opacity: 0.6; }

    .card-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .card-delete:hover { color: #ef4444; }
    .card-delete svg { width: 15px; height: 15px; }

    /* Feedback copié */
    .card.copied {
      border-color: var(--success);
      background: rgba(34,197,94,0.08);
    }
    .copied-badge {
      position: absolute;
      top: 10px;
      right: 12px;
      background: var(--success);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

    /* --- État vide --- */
    #empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    #empty-state svg { width: 52px; height: 52px; opacity: 0.3; margin-bottom: 16px; }
    #empty-state p { font-size: 0.95rem; line-height: 1.6; }

    /* --- Modal --- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      animation: backdropIn 0.2s ease;
    }
    @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-backdrop.closing { animation: backdropOut 0.2s ease forwards; }
    @keyframes backdropOut { to { opacity: 0; } }

    .modal {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 32px;
      width: 100%;
      max-width: 640px;
      box-shadow: var(--shadow);
      animation: slideUp 0.25s cubic-bezier(0.32, 0.72, 0, 1);
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal.closing { animation: slideDown 0.2s cubic-bezier(0.32, 0.72, 0, 1) forwards; }
    @keyframes slideDown { to { transform: translateY(100%); } }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal h2 {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .modal-sub {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 16px;
    }

    #modal-label {
      width: 100%;
      background: var(--bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 11px 14px;
      margin-bottom: 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    #modal-label:focus { border-color: var(--accent); }
    #modal-label::placeholder { color: var(--muted); }

    #modal-textarea {
      width: 100%;
      min-height: 140px;
      background: var(--bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.55;
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    #modal-textarea:focus { border-color: var(--accent); }
    #modal-textarea::placeholder { color: var(--muted); }

    .modal-footer {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .btn-cancel {
      flex: 1;
      background: var(--surface2);
      color: var(--muted);
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.07); }
    .btn-ok {
      flex: 2;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-ok:hover { opacity: 0.9; }
    .btn-ok:active { opacity: 0.8; }

    @media (min-width: 640px) {
      .modal-backdrop { align-items: center; padding: 20px; }
      .modal { border-radius: 20px; max-width: 500px; }
      .modal-handle { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>Copie Rapide</h1>
  <p>Appuie sur une carte pour copier le texte</p>
</header>

<div id="cards-list"></div>

<div id="empty-state">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="9" y="2" width="6" height="4" rx="1"/><path d="M8 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2h-2"/>
    <line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>
  </svg>
  <p>Aucun texte enregistré.<br>Appuie sur <strong>Nouveau</strong> pour commencer.</p>
</div>

<button id="btn-new" onclick="openModal()">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
  Nouveau
</button>

<script>
  const STORAGE_KEY = 'copie-rapide-v1';
  let items = [];

  function load() {
    try { items = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { items = []; }
  }
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function render() {
    const list = document.getElementById('cards-list');
    const empty = document.getElementById('empty-state');
    list.innerHTML = '';

    if (items.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    items.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.index = i;

      card.innerHTML = `
        ${item.label ? `<div class="card-label">${esc(item.label)}</div>` : ''}
        <div class="card-text" id="ct-${i}">${esc(item.text)}</div>
        <div class="card-actions">
          <span class="card-copy-hint">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Appuie pour copier
          </span>
          <button class="card-delete" title="Supprimer" onclick="deleteItem(event, ${i})">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
            </svg>
          </button>
        </div>`;

      card.addEventListener('click', (e) => {
        if (e.target.closest('.card-delete')) return;
        copyItem(card, item.text);
      });

      list.appendChild(card);
    });
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function copyItem(card, text) {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
      } else {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      showCopied(card);
    } catch (err) {
      alert('Impossible de copier. Essaie depuis un navigateur récent.');
    }
  }

  function showCopied(card) {
    card.classList.add('copied');
    const badge = document.createElement('span');
    badge.className = 'copied-badge';
    badge.textContent = '✓ Copié !';
    card.appendChild(badge);
    setTimeout(() => {
      card.classList.remove('copied');
      badge.remove();
    }, 1800);
  }

  function deleteItem(e, index) {
    e.stopPropagation();
    items.splice(index, 1);
    save();
    render();
  }

  /* ---- Modal ---- */
  let modalEl = null;

  function openModal() {
    if (modalEl) return;
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML = `
      <div class="modal" id="modal-inner">
        <div class="modal-handle"></div>
        <h2>Nouveau texte</h2>
        <p class="modal-sub">Colle ton texte ci-dessous et appuie sur OK.</p>
        <input id="modal-label" type="text" placeholder="Titre (optionnel)" autocomplete="off" spellcheck="false">
        <textarea id="modal-textarea" placeholder="Colle ton texte ici…" autofocus spellcheck="false"></textarea>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal()">Annuler</button>
          <button class="btn-ok" onclick="saveModal()">OK ✓</button>
        </div>
      </div>`;

    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) closeModal();
    });

    document.body.appendChild(backdrop);
    modalEl = backdrop;
    setTimeout(() => document.getElementById('modal-textarea').focus(), 50);
  }

  function closeModal() {
    if (!modalEl) return;
    modalEl.classList.add('closing');
    document.getElementById('modal-inner').classList.add('closing');
    setTimeout(() => {
      modalEl.remove();
      modalEl = null;
    }, 200);
  }

  function saveModal() {
    const text = document.getElementById('modal-textarea').value.trim();
    const label = document.getElementById('modal-label').value.trim();
    if (!text) {
      document.getElementById('modal-textarea').focus();
      document.getElementById('modal-textarea').style.borderColor = '#ef4444';
      return;
    }
    items.unshift({ text, label, created: Date.now() });
    save();
    render();
    closeModal();
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modalEl) closeModal();
    if ((e.key === 'Enter' && (e.ctrlKey || e.metaKey)) && modalEl) saveModal();
  });

  load();
  render();
</script>
</body>
</html>
